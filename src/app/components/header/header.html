<header class="header">
  <div class="header__container">
    <!-- Логотип -->
    <a href="#" class="header__logo" (click)="closeMenu()">
      <span class="logo-icon">❄️</span> Clima<span class="logo-accent">Pro</span>
    </a>

    <!-- Навигация (десктопная и мобильная) -->
    <nav class="header__nav" [class.header__nav--open]="isMenuOpen()">
      <ul class="header__menu">
        <li><a href="#catalog" class="header__link" (click)="closeMenu()">Каталог</a></li>
        <li><a href="#features" class="header__link" (click)="closeMenu()">Преимущества</a></li>
        <li><a href="#calculator" class="header__link" (click)="closeMenu()">Расчет мощности</a></li>
        <li><a href="#reviews" class="header__link" (click)="closeMenu()">Отзывы</a></li>
      </ul>

      <!-- Контакты внутри мобильного меню -->
      <div class="header__mobile-contacts">
        <a [href]="'tel:' + phoneNumber()" class="header__phone">{{ phoneNumber() }}</a>
        <button class="btn btn--primary btn--sm">Вызвать замерщика</button>
      </div>
    </nav>

    <!-- Правый блок на десктопе -->
    <div class="header__actions">
      <a [href]="'tel:' + phoneNumber()" class="header__phone">{{ phoneNumber() }}</a>
      <button class="btn btn--primary btn--sm">Вызвать замерщика</button>
    </div>

    <!-- Бургер-меню для мобилок -->
    <button
      class="header__burger"
      [class.header__burger--active]="isMenuOpen()"
      (click)="toggleMenu()"
      aria-label="Открыть меню">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>
</header>
